<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Today's Gold & Silver Rates</title>
 <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background: #0a0c0b;
        color: #ffd700;
        font-family: 'Segoe UI', Arial, sans-serif;
        height: 100vh;           /* full viewport height */
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;        /* prevent scrolling */
        margin: 0;
        padding: 2vh 2vw;        /* small edge padding for overscan */
    }

    .container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;  /* spreads header, grid, footer */
        max-width: 1600px;                /* optional, for very large screens */
        margin: 0 auto;
    }

    h1 {
        font-size: min(6vh, 4vw);        /* responsive: whichever is smaller */
        text-transform: uppercase;
        letter-spacing: 0.2em;
        text-shadow: 0 0 10px rgba(255,215,0,0.5);
        margin: 1vh 0;
        flex-shrink: 0;
    }

    .rates-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: min(2vh, 2vw);
        flex: 1 1 auto;           /* takes remaining space */
        align-content: center;
    }

    .rate-card {
        background: rgba(255,255,255,0.05);
        border-radius: min(2vh, 2vw);
        padding: min(2vh, 2vw);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .metal {
        font-size: min(4vh, 2.5vw);
        color: #ccc;
        margin-bottom: 1vh;
    }

    .value {
        font-size: min(10vh, 6vw);
        font-weight: bold;
        line-height: 1.2;
    }

    .unit {
        font-size: min(2vh, 1.5vw);
        color: #aaa;
        margin-top: 1vh;
    }

    .footer {
        font-size: min(2.5vh, 1.8vw);
        color: #888;
        margin-top: 1vh;
        flex-shrink: 0;
        text-align: center;
    }

    .error {
        color: #f66;
        font-size: min(3vh, 2vw);
        grid-column: span 2;
        text-align: center;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>⚡ PREcious METALS ⚡</h1>
        <div class="rates-grid" id="ratesGrid">
            <!-- Filled by JavaScript -->
        </div>
        <div class="footer" id="updateInfo">Loading rates...</div>
    </div>

    <script>
     
    async function fetchRates() {
        try {
            const response = await fetch('rates.json', { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP error ${response.status}`);
            const data = await response.json();

            // 👇 Log the fetched data to the browser console
            console.log('Fetched data:', data);

            const metals = [
                { key: '24kt', label: '24 Karat Gold' },
                { key: '22kt', label: '22 Karat Gold' },
                { key: '18kt', label: '18 Karat Gold' },
                { key: 'silver', label: 'Silver' }
            ];

            const grid = document.getElementById('ratesGrid');
            grid.innerHTML = '';

            let anyRateFound = false;
            metals.forEach(metal => {
                const rate = data[metal.key];
                if (rate !== undefined && !isNaN(rate)) {
                    anyRateFound = true;
                    const card = document.createElement('div');
                    card.className = 'rate-card';
                    card.innerHTML = `
                        <div class="metal">${metal.label}</div>
                        <div class="value">${Number(rate).toFixed(2)}</div>
                        <div class="unit">${data.currency || 'USD per troy ounce'}</div>
                    `;
                    grid.appendChild(card);
                } else {
                    console.warn(`Key "${metal.key}" not found or invalid in JSON`);
                }
            });

            if (!anyRateFound) {
                grid.innerHTML = '<div class="error" style="grid-column:span 2;">⚠️ No rates found. Check JSON keys match: 24kt, 22kt, 18kt, silver.</div>';
            }

            const dateStr = data.lastUpdated ? ` (as of ${data.lastUpdated})` : '';
            document.getElementById('updateInfo').textContent = `Rates updated ${dateStr} • Auto-refresh every minute`;
        } catch (error) {
            console.error('Fetch error:', error);
            document.getElementById('updateInfo').innerHTML = '<span class="error">⚠️ Could not load rates. Check that rates.json exists and is valid JSON.</span>';
        }
    }

    fetchRates();
    setInterval(fetchRates, 60000);
</script>

</body>
</html>
